<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cortex-Triage — Operator Board</title>
  <style>
    :root {
      --bg: #0b0d0b;
      --surface: #171817;
      --surface-2: #202120;
      --surface-3: #252625;
      --border: #292b2a;
      --border-strong: #383a38;
      --text: #f4f4f1;
      --text-2: #b8b8b2;
      --muted: #85857f;
      --accent: #8288f6;
      --accent-2: #f4b84f;
      --accent-soft: rgba(130,136,246,0.20);
      --p1: #ff6f61; --p1-soft: rgba(255,111,97,0.14); --p1-wash: rgba(255,111,97,0.055);
      --p2: #f4b84f; --p2-soft: rgba(244,184,79,0.16); --p2-wash: rgba(244,184,79,0.055);
      --p3: #9da0a0; --p3-soft: rgba(157,160,160,0.14); --p3-wash: rgba(157,160,160,0.045);
      --green: #55d69b; --green-soft: rgba(85,214,155,0.13);
      --radius: 8px; --radius-sm: 6px;
      --shadow: 0 14px 34px rgba(0,0,0,0.24);
      --shadow-lg: 0 22px 60px rgba(0,0,0,0.42);
      font-synthesis: none;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; overflow: hidden; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Inter, sans-serif;
      -webkit-font-smoothing: antialiased;
      font-size: 15px;
    }
    .mono { font-family: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace; font-variant-numeric: tabular-nums; }
    button { font: inherit; cursor: pointer; }
    ::-webkit-scrollbar { height: 10px; width: 10px; }
    ::-webkit-scrollbar-thumb { background: #777872; border-radius: 20px; }
    ::-webkit-scrollbar-track { background: transparent; }

    /* ---------- shell ---------- */
    .app { height: 100vh; display: grid; grid-template-rows: 64px minmax(0, 1fr); overflow: hidden; }
    .topbar {
      display: flex; align-items: center; gap: 16px;
      padding: 0 28px; border-bottom: 1px solid var(--border);
      background: rgba(11,13,11,0.96); position: sticky; top: 0; z-index: 20;
    }
    .brand { display: flex; align-items: center; gap: 12px; }
    .logo {
      position: relative; width: 34px; height: 34px; border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), #6f74ee);
      display: block; color: #ffffff;
      box-shadow: 0 0 26px rgba(130,136,246,.25), inset 0 0 0 1px rgba(255,255,255,.18);
    }
    .logo::before, .logo::after, .logo span { content: ""; position: absolute; border-radius: 50%; }
    .logo::before { inset: 8px; border: 2px solid rgba(255,255,255,.9); }
    .logo::after { inset: 14px; background: #ffffff; box-shadow: 0 0 14px rgba(255,255,255,.62); }
    .logo span { inset: 4px; border: 1px solid rgba(255,255,255,.32); }
    .brand h1 { margin: 0; font-size: 18px; font-weight: 700; letter-spacing: 0; }
    .brand p { margin: 0 0 0 14px; padding-left: 18px; border-left: 1px solid var(--border); font-size: 14px; color: var(--muted); font-weight: 600; }
    .spacer { flex: 1; }
    .top-search {
      flex: 0 1 480px; display: flex; align-items: center; gap: 10px;
      background: var(--surface); border: 1px solid var(--border-strong);
      border-radius: 8px; color: var(--muted); padding: 9px 13px; margin-left: auto;
    }
    .top-search input { width: 100%; background: transparent; border: 0; outline: 0; color: var(--text); font-size: 14px; }
    .top-search input::placeholder, .search input::placeholder { color: #6f706b; }
    .who { font-size: 13px; color: var(--text-2); display: flex; align-items: center; gap: 8px; padding: 6px 12px 6px 8px; background: transparent; border-radius: 999px; border: 1px solid var(--border); }
    .who .av { width: 20px; height: 20px; border-radius: 50%; background: var(--accent-soft); color: var(--accent); display: grid; place-items: center; font-size: 10.5px; font-weight: 800; }
    .shell { min-height: 0; display: grid; grid-template-columns: 72px minmax(0, 1fr); overflow: hidden; }
    .side-nav { border-right: 1px solid var(--border); padding: 14px 10px; overflow: auto; background: #0f110f; }
    .nav-section { color: #6f706b; font-size: 12px; font-weight: 800; letter-spacing: .03em; margin: 0 0 12px 9px; text-transform: uppercase; }
    .main { min-width: 0; overflow: hidden; display: flex; flex-direction: column; }
    .content-head { flex: none; display: flex; align-items: center; justify-content: space-between; gap: 18px; padding: 14px 18px; border-bottom: 1px solid rgba(41,43,42,.72); background: #101210; }
    .eyebrow { display:flex; align-items:center; gap:10px; color: var(--accent-2); font-size:12px; font-weight:800; text-transform:uppercase; }
    .eyebrow .sq { width:30px; height:30px; border:1px solid var(--border-strong); border-radius:8px; display:grid; place-items:center; background:var(--surface); }
    .content-head h2 { margin: 8px 0 0; font-size: 24px; line-height: 1; letter-spacing: 0; }
    .content-head p { margin: 0; max-width: 520px; color: var(--text-2); font-size: 13px; line-height: 1.45; text-align: right; }
    .right-rail { display: none; }

    .icon-btn {
      width: 38px; height: 38px; border-radius: 8px; border: 1px solid transparent;
      background: transparent; color: var(--text-2); display: grid; place-items: center; font-size: 16px;
      transition: background .15s ease, border-color .15s ease;
    }
    .icon-btn:hover { background: var(--surface-2); border-color: var(--border-strong); }

    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 9px 15px; border-radius: 8px; border: 1px solid var(--border);
      background: var(--surface); color: var(--text); font-size: 13.5px; font-weight: 600;
      transition: transform .08s ease, background .15s ease, border-color .15s ease;
    }
    .btn:hover { background: var(--surface-2); border-color: var(--border-strong); }
    .btn:active { transform: translateY(1px); }
    .btn.primary { background: var(--accent); border: none; color: #ffffff; box-shadow: 0 8px 24px rgba(130,136,246,0.22); }
    .btn.primary:hover { background: #747bf0; }
    .btn.ghost { background: transparent; border-color: transparent; }
    .btn.ghost:hover { background: var(--surface-2); }
    .btn[disabled] { opacity: .5; cursor: not-allowed; }

    /* ---------- tabs ---------- */
    .tabbar { display: flex; flex-direction: column; gap: 8px; padding: 0; }
    .tab-btn {
      width: 50px; height: 44px; display: grid; place-items: center; padding: 0; background: transparent; border: none; border-radius: 8px;
      color: var(--muted); font-size: 0; font-weight: 700; transition: color .15s ease, background .15s ease;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: #ffffff; background: var(--accent); }
    .nav-list { display: none; }
    .nav-section { display: none; }

    /* ---------- metrics ---------- */
    .board-page { min-height: 0; flex: 1; display: grid; grid-template-rows: auto auto minmax(0, 1fr); overflow: hidden; }
    .metrics { display: grid; grid-template-columns: repeat(5, minmax(118px, 1fr)); gap: 10px; padding: 12px 18px 8px; }
    .metric {
      background: var(--surface);
      border: 1px solid var(--border); border-radius: var(--radius);
      padding: 11px 12px; display: flex; align-items: center; gap: 10px; min-width: 0;
    }
    .metric .badge { width: 30px; height: 30px; border-radius: 8px; display: grid; place-items: center; font-size: 16px; flex: none; }
    .metric .k { font-size: 11px; color: var(--muted); font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .metric .v { font-size: 21px; font-weight: 750; letter-spacing: 0; line-height: 1.1; }
    .pill { display: inline-flex; align-items:center; gap:6px; padding: 3px 10px; border-radius: 999px; font-size: 11.5px; font-weight: 700; }
    .pill.p1 { color: var(--p1); background: var(--p1-soft); }
    .pill.p2 { color: var(--p2); background: var(--p2-soft); }
    .pill.p3 { color: var(--p3); background: var(--p3-soft); }

    /* ---------- toolbar ---------- */
    .toolbar { display: flex; align-items: center; gap: 10px; padding: 8px 18px 12px; flex-wrap: wrap; background: var(--bg); z-index: 5; }
    .search {
      display: flex; align-items: center; gap: 8px; flex: 1; min-width: 220px;
      background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 13px;
    }
    .search input { background: transparent; border: none; outline: none; color: var(--text); width: 100%; font-size: 14px; }
    .chips { display: flex; gap: 6px; }
    .chip {
      padding: 8px 13px; border-radius: 8px; border: 1px solid var(--border);
      background: var(--surface); color: var(--text-2); font-size: 12.5px; font-weight: 600;
    }
    .chip.active { color: #ffffff; border-color: rgba(130,136,246,0.55); background: var(--accent-soft); }

    /* ---------- board ---------- */
    .board { min-height: 0; display: grid; grid-template-columns: repeat(3, minmax(300px, 1fr)); gap: 14px; padding: 0 18px 18px; overflow: hidden; align-items: stretch; }
    .col { min-height: 0; display: flex; flex-direction: column; background: rgba(23,24,23,0.45); border: 1px solid rgba(41,43,42,.75); border-radius: 10px; overflow: hidden; }
    .col-head { flex: none; display: flex; align-items: center; gap: 9px; padding: 12px 14px; background: rgba(32,33,32,.72); border-bottom: 1px solid var(--border); }
    .col-head .name { font-weight: 700; font-size: 13.5px; }
    .col-head .count { margin-left: auto; font-size: 12px; color: var(--muted); background: var(--surface-2); padding: 2px 9px; border-radius: 999px; }
    .col-dot { width: 8px; height: 8px; border-radius: 50%; }
    .col.p1 .col-dot { background: var(--p1); } .col.p2 .col-dot { background: var(--p2); } .col.p3 .col-dot { background: var(--p3); }
    .col-body { min-height: 0; overflow: auto; display: flex; flex-direction: column; gap: 12px; padding: 12px; }

    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 12px 13px;
      transition: box-shadow .15s ease, border-color .15s ease; flex: none;
    }
    .card.p1 { background: linear-gradient(180deg, var(--p1-wash), var(--surface) 65%); border-color: rgba(255,111,97,0.20); }
    .card.p2 { background: linear-gradient(180deg, var(--p2-wash), var(--surface) 65%); border-color: rgba(244,184,79,0.22); }
    .card.p3 { background: linear-gradient(180deg, var(--p3-wash), var(--surface) 65%); border-color: rgba(157,160,160,0.16); }
    .card:hover { box-shadow: var(--shadow); border-color: var(--border-strong); }
    .card.flash { animation: flash 1.8s ease; }
    @keyframes flash { 0% { box-shadow: 0 0 0 2px var(--accent), var(--shadow); } 100% { box-shadow: none; } }
    .card .title { font-weight: 680; font-size: 13.5px; line-height: 1.35; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .card .meta { display: flex; align-items: center; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
    .tag { font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 999px; background: var(--surface-2); color: var(--text-2); text-transform: capitalize; }
    .tag.type { color: var(--accent); background: var(--accent-soft); }
    .tag.risk-high { color: var(--p1); background: var(--p1-soft); }
    .tag.risk-medium { color: var(--p2); background: var(--p2-soft); }
    .tag.risk-low { color: var(--green); background: var(--green-soft); }
    .compact-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-top: 9px; color: var(--muted); font-size: 11.5px; }
    .compact-row .src { margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .status-strip { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
    .scores { display: flex; gap: 10px; margin-top: 10px; }
    .score { flex: 1; }
    .score .lab { font-size: 10.5px; color: var(--muted); display: flex; justify-content: space-between; font-weight: 600; }
    .track { height: 5px; border-radius: 999px; background: var(--surface-2); margin-top: 5px; overflow: hidden; }
    .track > span { display: block; height: 100%; border-radius: 999px; background: var(--accent); }
    .card details { margin-top: 10px; }
    .card details.card-actions { border-top: 1px solid var(--border); padding-top: 8px; }
    .card summary { cursor: pointer; font-size: 12px; color: var(--text-2); list-style: none; display: flex; align-items: center; gap: 6px; user-select: none; font-weight: 600; }
    .card summary::-webkit-details-marker { display: none; }
    .card summary::before {
      content: ""; display: inline-block; width: 0; height: 0;
      border-style: solid; border-width: 4px 0 4px 6px;
      border-color: transparent transparent transparent var(--muted);
      transition: transform .15s;
    }
    .card details[open] summary::before { transform: rotate(90deg); }
    .reason { font-size: 12.5px; color: var(--text-2); line-height: 1.55; margin: 10px 0 0; }
    .fix { margin-top: 10px; padding: 12px; background: var(--surface-2); border-radius: 12px; }
    .fix .fx-title { font-size: 12.5px; font-weight: 700; display: flex; align-items: center; gap: 7px; }
    .fix .fx-body { font-size: 12.5px; color: var(--text-2); margin-top: 6px; line-height: 1.55; }
    pre { margin: 9px 0 0; padding: 11px; background: #101110; border: 1px solid var(--border); border-radius: 8px; overflow: auto; font-size: 11.5px; color: var(--text-2); max-height: 230px; }
    .dup { font-size: 11px; color: var(--p2); margin-top: 9px; font-weight: 600; }
    .src { font-size: 11.5px; color: var(--muted); margin-top: 9px; }
    .src a { color: var(--accent); text-decoration: none; }
    .panel { margin-top: 8px; padding: 10px; border-radius: 8px; }
    .panel.soft { background: var(--surface-2); }

    /* ---------- skeleton / empty ---------- */
    .skel { height: 96px; border-radius: var(--radius); background: linear-gradient(90deg, var(--surface) 25%, var(--surface-2) 37%, var(--surface) 63%); background-size: 400% 100%; animation: shimmer 1.3s infinite; border: 1px solid var(--border); }
    @keyframes shimmer { 0% { background-position: 100% 0; } 100% { background-position: -100% 0; } }
    .empty { text-align: center; color: var(--muted); font-size: 13px; padding: 30px 10px; background: var(--surface); border: 1px dashed var(--border-strong); border-radius: var(--radius); }

    /* ---------- modal ---------- */
    .scrim { position: fixed; inset: 0; background: rgba(0,0,0,0.56); backdrop-filter: blur(3px); z-index: 50; display: grid; place-items: center; padding: 20px; }
    .modal { width: 100%; max-width: 520px; background: var(--surface); border: 1px solid var(--border-strong); border-radius: 12px; box-shadow: var(--shadow-lg); overflow: hidden; }
    .modal h2 { margin: 0; font-size: 16px; font-weight: 700; }
    .modal .head { padding: 20px 22px 16px; display: flex; align-items: center; gap: 10px; }
    .modal .body { padding: 0 22px 18px; display: flex; flex-direction: column; gap: 15px; max-height: min(68vh, 620px); overflow: auto; }
    .modal .foot { padding: 16px 22px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; }
    .field label { font-size: 12.5px; color: var(--text-2); font-weight: 600; display: block; margin-bottom: 6px; }
    .field input, .field textarea, .field select {
      width: 100%; background: var(--surface-2); border: 1px solid transparent; color: var(--text);
      border-radius: 8px; padding: 10px 13px; font-size: 14px; outline: none; resize: vertical;
    }
    .field input:focus, .field textarea:focus, .field select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); background: var(--surface); }

    /* ---------- FAB ---------- */
    .fab {
      position: fixed; right: 24px; bottom: 24px; z-index: 40;
      width: 52px; height: 52px; border-radius: 50%; border: none;
      background: var(--accent); color: #fff; font-size: 26px; font-weight: 400;
      display: grid; place-items: center; box-shadow: var(--shadow-lg);
      transition: transform .12s ease, background .15s ease;
    }
    .fab:hover { background: #747bf0; transform: translateY(-2px); }
    .fab:active { transform: translateY(0); }

    /* ---------- stepper ---------- */
    .steps { display: flex; flex-direction: column; gap: 11px; }
    .step { display: flex; align-items: center; gap: 11px; font-size: 13px; color: var(--muted); }
    .step .ic { width: 23px; height: 23px; border-radius: 50%; border: 2px solid var(--border-strong); display: grid; place-items: center; font-size: 12px; flex: none; }
    .step.active { color: var(--text); }
    .step.active .ic { border-color: var(--accent); color: var(--accent); animation: pulse 1s infinite; }
    .step.done { color: var(--text-2); }
    .step.done .ic { border-color: var(--green); background: var(--green-soft); color: var(--green); }
    @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 var(--accent-soft); } 50% { box-shadow: 0 0 0 6px transparent; } }

    /* ---------- releases page ---------- */
    .releases { min-height: 0; overflow: auto; padding: 18px 28px 48px; display: flex; flex-direction: column; gap: 16px; }
    .compile-row { display: flex; gap: 10px; }
    .compile-row input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 13px; font-size: 14px; outline: none; color: var(--text); }
    .compile-row input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
    .note-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 19px; }

    /* ---------- toasts ---------- */
    .toasts { position: fixed; right: 18px; bottom: 96px; z-index: 70; display: flex; flex-direction: column; gap: 10px; }
    .toast { background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--accent); padding: 12px 15px; border-radius: 12px; font-size: 13px; box-shadow: var(--shadow-lg); max-width: 340px; animation: slidein .2s ease; }
    .toast.ok { border-left-color: var(--green); } .toast.err { border-left-color: var(--p1); }
    @keyframes slidein { from { transform: translateY(8px); opacity: .4; } to { transform: none; opacity: 1; } }

    .center { min-height: 70vh; display: grid; place-items: center; text-align: center; }
    .spin { width: 28px; height: 28px; border-radius: 50%; border: 3px solid var(--border-strong); border-top-color: var(--accent); animation: rot .8s linear infinite; margin: 0 auto 14px; }
    @keyframes rot { to { transform: rotate(360deg); } }
    .md { font-size: 13px; color: var(--text-2); line-height: 1.65; white-space: pre-wrap; }

    @media (max-width: 1180px) {
      .shell { grid-template-columns: 64px minmax(0, 1fr); }
      .fab { right: 24px; }
      .topbar { padding: 0 28px; }
      .top-search { display: none; }
      .board { overflow-x: auto; grid-template-columns: repeat(3, minmax(300px, 1fr)); }
    }
    @media (max-width: 900px) {
      html, body { overflow: auto; }
      .app { display: block; height: auto; min-height: 100vh; overflow: visible; }
      .shell { display: block; }
      .side-nav { border-right: 0; border-bottom: 1px solid var(--border); padding: 10px 18px; }
      .tabbar, .nav-list { flex-direction: row; overflow-x: auto; padding-bottom: 8px; }
      .tab-btn { width: 48px; height: 40px; border-radius: 8px; white-space: nowrap; }
      .nav-section, .nav-list { display: none; }
      .main, .board-page { overflow: visible; display: block; }
      .content-head { display: block; padding: 22px 18px 14px; }
      .content-head p { text-align: left; margin-top: 10px; }
      .metrics, .toolbar, .board, .releases { padding-left: 18px; padding-right: 18px; }
      .metrics { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .board { display: flex; overflow-x: auto; padding-bottom: 24px; }
      .col { min-width: 310px; max-height: 72vh; }
      .content-head h2 { font-size: 42px; }
      .content-head p { font-size: 17px; }
    }
  </style>
</head>
<body>
  <div id="root">
    <div class="center"><div><div class="spin"></div><div style="color:var(--muted);font-size:13px">Connecting to Cortex…</div></div></div>
  </div>
  <div class="toasts" id="toasts"></div>

  <script>
  (function () {
    var cfg = window.__LEMMA_CONFIG__ || {};
    var base = (cfg.apiUrl || window.location.origin).replace(/\/$/, "");
    var s = document.createElement("script");
    s.src = base + "/public/sdk/lemma-client.js";
    s.onload = boot;
    s.onerror = function () { fatal("Could not load the Lemma SDK from " + base + "/public/sdk/lemma-client.js"); };
    document.head.appendChild(s);
  })();

  // ---------- tiny helpers ----------
  var $ = function (sel, root) { return (root || document).querySelector(sel); };
  function h(html) { var t = document.createElement("template"); t.innerHTML = html.trim(); return t.content.firstChild; }
  function esc(s) { return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) { return ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[c]; }); }
  function fatal(msg) { $("#root").innerHTML = '<div class="center"><div><div style="font-size:15px;margin-bottom:8px;display:flex;align-items:center;gap:8px;justify-content:center">' + ic("alertTriangle", 18) + ' ' + esc(msg) + '</div><div style="color:var(--muted);font-size:13px">Open this app from inside the Lemma pod so it receives its config + session.</div></div></div>'; }
  function toast(msg, kind) {
    var t = h('<div class="toast ' + (kind || "") + '">' + esc(msg) + '</div>');
    $("#toasts").appendChild(t);
    setTimeout(function () { t.style.opacity = "0"; t.style.transition = "opacity .3s"; setTimeout(function () { t.remove(); }, 300); }, kind === "err" ? 6000 : 3800);
  }
  function items(res) { return (res && res.items) ? res.items : (Array.isArray(res) ? res : []); }
  function initials(name) { name = String(name || "?"); return name.slice(0, 1).toUpperCase(); }

  // ---------- icon system (inline SVG, no external assets — replaces emoji) ----------
  var ICONS = {
    list: '<rect x="4" y="3" width="16" height="18" rx="2"/><line x1="8" y1="8" x2="16" y2="8"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="16" x2="13" y2="16"/>',
    alertCircle: '<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="13"/><line x1="12" y1="16" x2="12" y2="16.01"/>',
    arrowDownCircle: '<circle cx="12" cy="12" r="10"/><polyline points="8 10.5 12 14.5 16 10.5"/>',
    target: '<circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.3" fill="currentColor" stroke="none"/>',
    sliders: '<line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/>',
    refresh: '<polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>',
    plus: '<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>',
    tool: '<path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>',
    alertTriangle: '<path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12" y2="17.01"/>',
    gitPr: '<circle cx="18" cy="18" r="3"/><circle cx="6" cy="6" r="3"/><path d="M13 6h3a2 2 0 0 1 2 2v7"/><line x1="6" y1="9" x2="6" y2="21"/>',
    check: '<polyline points="20 6 9 17 4 12"/>',
    search: '<circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>'
  };
  var ICONS_FILLED = {
    bolt: '<polygon points="13,2 3,14 11,14 9,22 21,10 13,10"/>'
  };
  function ic(name, size) {
    size = size || 16;
    if (ICONS_FILLED[name]) {
      return '<svg width="' + size + '" height="' + size + '" viewBox="0 0 24 24" fill="currentColor" style="vertical-align:-3px;flex:none">' + ICONS_FILLED[name] + '</svg>';
    }
    return '<svg width="' + size + '" height="' + size + '" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" ' +
      'stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-3px;flex:none">' + (ICONS[name] || "") + '</svg>';
  }
  var SEV = { P1: { name: "P1 · Critical", cls: "p1" }, P2: { name: "P2 · High", cls: "p2" }, P3: { name: "P3 · Low", cls: "p3" } };
  function sevOf(b) { return (b.severity === "P1" || b.severity === "P2") ? b.severity : "P3"; }

  // ---------- state ----------
  var client = null;
  var S = { user: null, bugs: [], fixByBug: {}, issueById: {}, incidentByBug: {}, notes: [], cfg: null, alertCfg: null, sourceCfg: null, filter: "all", q: "", loading: true, newest: null, tab: "board" };

  async function boot() {
    try {
      client = new window.LemmaClient.LemmaClient();
      var st = await client.initialize();
      if (!st || st.status !== "authenticated") { client.auth.redirectToAuth(); return; }
      S.user = st.user || null;
      await loadAll();
      render();
    } catch (e) { fatal((e && e.message) ? e.message : String(e)); }
  }

  async function loadAll() {
    S.loading = true; render();
    var bugs = [], fixes = [], issues = [], notes = [];
    try {
      var res = await Promise.all([
        client.records.list("bugs", { limit: 300 }),
        client.records.list("fixes", { limit: 500 }),
        client.records.list("issues", { limit: 500 }),
        client.records.list("release_notes", { limit: 50 }),
        client.records.list("incidents", { limit: 300 })
      ]);
      bugs = items(res[0]); fixes = items(res[1]); issues = items(res[2]); notes = items(res[3]);
      var incidents = items(res[4]);
      S.incidentByBug = {};
      incidents.forEach(function (inc) { if (inc.bug_id && !S.incidentByBug[inc.bug_id]) S.incidentByBug[inc.bug_id] = inc; });
    } catch (e) { toast("Load failed: " + (e.message || e), "err"); }
    S.fixByBug = {}; fixes.forEach(function (f) { if (!S.fixByBug[f.bug_id]) S.fixByBug[f.bug_id] = f; });
    S.issueById = {}; issues.forEach(function (i) { S.issueById[i.id] = i; });
    S.notes = notes.sort(function (a, b) { return String(b.created_at || "").localeCompare(String(a.created_at || "")); });
    try { var cf = items(await client.records.list("github_config", { limit: 1 })); S.cfg = cf[0] || null; } catch (e) { S.cfg = null; }
    try { var af = items(await client.records.list("alert_config", { limit: 1 })); S.alertCfg = af[0] || null; } catch (e) { S.alertCfg = null; }
    try { var sf = items(await client.records.list("source_config", { limit: 1 })); S.sourceCfg = sf[0] || null; } catch (e) { S.sourceCfg = null; }

    // Only ever show bugs whose issue belongs to the repo currently connected
    // in settings — a bug from a different (or no longer configured) repo
    // has nothing to do with what's on screen right now.
    var activeRepo = (S.cfg && S.cfg.repo) ? S.cfg.repo.trim() : "";
    if (activeRepo) {
      bugs = bugs.filter(function (b) {
        var iss = S.issueById[b.issue_id];
        return !!(iss && iss.repo === activeRepo);
      });
    }
    S.bugs = bugs.sort(function (a, b) { return String(b.created_at || "").localeCompare(String(a.created_at || "")); });
    S.loading = false;
  }

  // ---------- render: shell ----------
  function metricsHtml() {
    var c = { P1: 0, P2: 0, P3: 0 };
    S.bugs.forEach(function (b) { c[sevOf(b)]++; });
    var total = S.bugs.length;
    var avg = total ? Math.round(100 * S.bugs.reduce(function (s, b) { return s + (Number(b.confidence) || 0); }, 0) / total) : 0;
    function card(emoji, bg, fg, k, v, sub) {
      return '<div class="metric"><div class="badge" style="background:' + bg + ';color:' + fg + '">' + emoji + '</div>' +
        '<div><div class="k">' + k + '</div><div class="v">' + v + (sub || "") + '</div></div></div>';
    }
    return '<div class="metrics">' +
      card(ic("list", 18), "var(--accent-soft)", "var(--accent)", "Open bugs", total) +
      card(ic("alertCircle", 18), "var(--p1-soft)", "var(--p1)", "Critical · P1", c.P1) +
      card(ic("bolt", 16), "var(--p2-soft)", "var(--p2)", "High · P2", c.P2) +
      card(ic("arrowDownCircle", 18), "var(--p3-soft)", "var(--p3)", "Low · P3", c.P3) +
      card(ic("target", 18), "var(--green-soft)", "var(--green)", "Avg confidence", avg, '<span style="font-size:14px;color:var(--muted)">%</span>') +
      '</div>';
  }

  function cardHtml(b) {
    var sev = sevOf(b), fix = S.fixByBug[b.id], iss = S.issueById[b.issue_id];
    var imp = Math.max(0, Math.min(100, Number(b.impact_score) || 0));
    var urg = Math.max(0, Math.min(100, Number(b.urgency_score) || 0));
    var conf = Math.round((Number(b.confidence) || 0) * 100);
    var inc = S.incidentByBug[b.id];
    var status = b.decision_status || "pending";
    var html = '<div class="card ' + sev + (S.newest === b.id ? ' flash' : '') + '" data-id="' + esc(b.id) + '">';
    html += '<div class="title">' + esc(b.title) + '</div>';
    html += '<div class="meta"><span class="tag type">' + esc(b.bug_type || "other") + '</span>';
    html += '<span class="tag">conf ' + conf + '%</span>';
    if (inc) html += '<span class="tag" style="color:' + (inc.status === "resolved" ? 'var(--green)' : 'var(--p1)') + ';background:' + (inc.status === "resolved" ? 'var(--green-soft)' : 'var(--p1-soft)') + '">' + (inc.status === "resolved" ? "resolved" : "incident") + '</span>';
    if (b.assignee_login) html += '<span class="tag">@' + esc(b.assignee_login) + '</span>';
    if (status !== "pending") html += '<span class="tag" style="color:var(--accent);background:var(--accent-soft)">' + esc(status) + '</span>';
    if (b.is_duplicate) html += '<span class="tag" style="color:var(--p2);background:var(--p2-soft)">duplicate</span>';
    html += '</div>';
    html += '<div class="scores"><div class="score"><div class="lab"><span>Impact</span><span class="mono">' + imp + '</span></div><div class="track"><span style="width:' + imp + '%"></span></div></div>' +
            '<div class="score"><div class="lab"><span>Urgency</span><span class="mono">' + urg + '</span></div><div class="track"><span style="width:' + urg + '%"></span></div></div></div>';
    if (iss && iss.url) html += '<div class="compact-row"><div class="src">source: ' + esc(iss.source || "—") + ' · <a href="' + esc(iss.url) + '" target="_blank" rel="noopener">link ↗</a></div><span class="mono">' + sev + '</span></div>';
    else if (iss) html += '<div class="compact-row"><div class="src">source: ' + esc(iss.source || "—") + (iss.reporter ? ' · ' + esc(iss.reporter) : '') + '</div><span class="mono">' + sev + '</span></div>';
    else html += '<div class="compact-row"><div class="src">source: unknown</div><span class="mono">' + sev + '</span></div>';
    if (b.jira_issue_url) html += '<div class="src" style="margin-top:-4px">jira: <a href="' + esc(b.jira_issue_url) + '" target="_blank" rel="noopener">' + esc(b.jira_issue_key || "ticket") + ' ↗</a></div>';

    var det = '';
    if (b.duplicate_of) det += '<div class="dup">↔ likely duplicate of: ' + esc(b.duplicate_of) + '</div>';
    det += incidentHtml(b);
    det += ownerHtml(b);
    det += fixPrHtml(b);
    det += decisionHtml(b);
    if (b.reasoning) det += '<p class="reason"><strong style="color:var(--text-2)">Why ' + esc(b.severity) + ':</strong> ' + esc(b.reasoning) + '</p>';
    if (fix) {
      det += '<div class="fix"><div class="fx-title">' + ic("tool", 14) + ' ' + esc(fix.title || "Suggested fix") +
        ' <span class="tag risk-' + esc(fix.risk_level || "medium") + '" style="margin-left:auto">' + esc(fix.risk_level || "medium") + ' risk</span>' +
        ' <span class="tag">' + esc(fix.estimated_effort || "small") + '</span></div>';
      if (fix.suggestion) det += '<div class="fx-body">' + esc(fix.suggestion) + '</div>';
      if (fix.code_snippet) det += '<pre class="mono">' + esc(fix.code_snippet) + '</pre>';
      det += '</div>';
    }
    if (det) html += '<details class="card-actions"><summary>Actions &amp; details</summary>' + det + '</details>';
    html += '</div>';
    return html;
  }

  function columnHtml(sev) {
    var meta = SEV[sev];
    var list = S.bugs.filter(function (b) { return sevOf(b) === sev; }).filter(matchFilter);
    var inner = '';
    if (S.loading) inner = '<div class="skel"></div><div class="skel"></div>';
    else if (!list.length) inner = '<div class="empty">No ' + sev + ' bugs</div>';
    else inner = list.map(cardHtml).join("");
    return '<div class="col ' + meta.cls + '"><div class="col-head"><span class="col-dot"></span><span class="name">' + meta.name + '</span><span class="count">' + list.length + '</span></div><div class="col-body">' + inner + '</div></div>';
  }

  function matchFilter(b) {
    if (S.filter !== "all" && sevOf(b) !== S.filter) return false;
    if (!S.q) return true;
    var fix = S.fixByBug[b.id] || {};
    var hay = (b.title + " " + (b.bug_type || "") + " " + (b.reasoning || "") + " " + (fix.suggestion || "")).toLowerCase();
    return hay.indexOf(S.q.toLowerCase()) >= 0;
  }

  function boardPageHtml() {
    return '<div class="board-page">' + metricsHtml() +
      '<div class="toolbar"><div class="search">' + ic("search", 15) + ' <input id="q" placeholder="Search bugs, types, fixes…" value="' + esc(S.q) + '" /></div>' +
      '<div class="chips">' + ["all", "P1", "P2", "P3"].map(function (f) {
        return '<button class="chip ' + (S.filter === f ? "active" : "") + '" data-f="' + f + '">' + (f === "all" ? "All" : f) + '</button>';
      }).join("") + '</div></div>' +
      '<div class="board">' + columnHtml("P1") + columnHtml("P2") + columnHtml("P3") + '</div></div>';
  }

  function releasesPageHtml() {
    var list = S.notes.length ? S.notes.map(function (n) {
      return '<div class="note-card"><div class="title" style="font-size:15px">' + esc(n.version || "untitled") +
        ' <span class="tag" style="margin-left:6px">' + (n.bug_count || 0) + ' bugs</span></div>' +
        (n.notes_markdown ? '<div class="md" style="margin-top:11px">' + esc(n.notes_markdown) + '</div>' : '<div class="src" style="margin-top:8px">No notes content yet.</div>') + '</div>';
    }).join("") : '<div class="empty">No release notes yet. Compile one below.</div>';
    return '<div class="releases">' +
      '<div class="compile-row"><input id="nVer" class="mono" placeholder="v0.3.0" /><button class="btn primary" id="nGo">Compile release notes</button></div>' +
      list + '</div>';
  }

  function rightRailHtml() {
    var c = { P1: 0, P2: 0, P3: 0 };
    S.bugs.forEach(function (b) { c[sevOf(b)]++; });
    var openInc = Object.keys(S.incidentByBug || {}).filter(function (id) {
      var inc = S.incidentByBug[id];
      return inc && inc.status !== "resolved";
    }).length;
    var avg = S.bugs.length ? Math.round(100 * S.bugs.reduce(function (s, b) { return s + (Number(b.confidence) || 0); }, 0) / S.bugs.length) : 0;
    return '<aside class="right-rail"><h3>On this board</h3>' +
      '<span class="rail-link">Open bugs: <strong style="color:var(--text)">' + S.bugs.length + '</strong></span>' +
      '<span class="rail-link">Critical P1: <strong style="color:var(--p1)">' + c.P1 + '</strong></span>' +
      '<span class="rail-link">High P2: <strong style="color:var(--p2)">' + c.P2 + '</strong></span>' +
      '<span class="rail-link">Low P3: <strong style="color:var(--p3)">' + c.P3 + '</strong></span>' +
      '<span class="rail-link">Open incidents: <strong style="color:var(--text)">' + openInc + '</strong></span>' +
      '<span class="rail-link">Avg confidence: <strong style="color:var(--green)">' + avg + '%</strong></span>' +
      '<span class="rail-link">Release notes: <strong style="color:var(--text)">' + S.notes.length + '</strong></span>' +
      '</aside>';
  }

  // ---------- render: root ----------
  function render() {
    var who = S.user ? (S.user.email || S.user.name || "you") : "…";
    var html = '<div class="app">';
    html += '<div class="topbar"><div class="brand"><div class="logo"><span></span></div><h1>Cortex</h1><p>Operator Board</p></div>' +
      '<div class="spacer"></div>' +
      '<div class="top-search">' + ic("search", 17) + '<input id="qTop" placeholder="Search incidents" value="' + esc(S.q) + '" /></div>' +
      '<span class="who"><span class="av">' + esc(initials(who)) + '</span> ' + esc(who) + '</span>' +
      '<button class="icon-btn" id="btnRefresh" title="Refresh">' + ic("refresh", 16) + '</button>' +
      '<button class="icon-btn" id="btnSettings" title="Connect GitHub repo">' + ic("sliders", 16) + '</button></div>';
    html += '<div class="shell"><aside class="side-nav">' +
      '<div class="nav-section">Operate</div><div class="tabbar">' +
      '<button class="tab-btn ' + (S.tab === "board" ? "active" : "") + '" data-tab="board">' + ic("target", 17) + ' Dashboard</button>' +
      '<button class="tab-btn ' + (S.tab === "releases" ? "active" : "") + '" data-tab="releases">' + ic("list", 17) + ' Releases</button>' +
      '</div><div class="nav-section">Triage flow</div><div class="nav-list">' +
      '<div class="nav-item">' + ic("alertCircle", 17) + ' Incidents</div>' +
      '<div class="nav-item">' + ic("tool", 17) + ' Suggested fixes</div>' +
      '<div class="nav-item">' + ic("gitPr", 17) + ' GitHub actions</div>' +
      '<div class="nav-item">' + ic("check", 17) + ' Decisions</div>' +
      '</div></aside><main class="main">' +
      '<section class="content-head"><div class="eyebrow"><span class="sq">' + ic(S.tab === "releases" ? "list" : "target", 16) + '</span>' + (S.tab === "releases" ? "Release center" : "Live triage") + '</div>' +
      '<h2>' + (S.tab === "releases" ? "Releases" : "Dashboard") + '</h2>' +
      '<p>' + (S.tab === "releases" ? "Compile ship-ready notes from triaged bugs and suggested fixes." : "Severity lanes stay fixed while each queue scrolls on its own.") + '</p></section>' +
      (S.tab === "releases" ? releasesPageHtml() : boardPageHtml()) +
      '</main></div>';
    html += '</div><button class="fab" id="btnNew" title="New bug report">' + ic("plus", 22) + '</button>';
    $("#root").innerHTML = html;

    $("#btnNew").onclick = openNewReport;
    $("#btnRefresh").onclick = function () { loadAll().then(render).then(function(){ toast("Refreshed"); }); };
    $("#btnSettings").onclick = openSettings;
    Array.prototype.forEach.call(document.querySelectorAll(".tab-btn"), function (t) { t.onclick = function () { S.tab = t.dataset.tab; render(); }; });
    var qHead = $("#qTop"); if (qHead) { qHead.oninput = function () { S.q = qHead.value; var pos = qHead.selectionStart; render(); var n = $("#qTop"); n.focus(); try { n.setSelectionRange(pos, pos); } catch (e) {} }; }

    if (S.tab === "board") {
      var q = $("#q"); if (q) { q.oninput = function () { S.q = q.value; var pos = q.selectionStart; render(); var n = $("#q"); n.focus(); try { n.setSelectionRange(pos, pos); } catch (e) {} }; }
      Array.prototype.forEach.call(document.querySelectorAll(".chip"), function (c) { c.onclick = function () { S.filter = c.dataset.f; render(); }; });
      Array.prototype.forEach.call(document.querySelectorAll(".assign-btn"), function (b) { b.onclick = function () { approveAssign(b.dataset.bug, b); }; });
      Array.prototype.forEach.call(document.querySelectorAll(".ack-btn"), function (b) { b.onclick = function () { ackIncident(b.dataset.inc, b); }; });
      Array.prototype.forEach.call(document.querySelectorAll(".resolve-btn"), function (b) { b.onclick = function () { resolveIncident(b.dataset.inc, b); }; });
      Array.prototype.forEach.call(document.querySelectorAll(".decide-btn"), function (b) { b.onclick = function () { decideBug(b.dataset.bug, b.dataset.decision, b); }; });
      if (S.newest) setTimeout(function () { S.newest = null; }, 1800);
    } else {
      var go = $("#nGo"); if (go) go.onclick = function () { compileNotes(($("#nVer").value || "").trim() || "v0.1.0", go); };
    }
  }

  // ---------- New report → run triage-issue ----------
  function openNewReport() {
    var scrim = h('<div class="scrim"></div>');
    scrim.innerHTML =
      '<div class="modal"><div class="head"><h2 style="display:flex;align-items:center;gap:9px">' + ic("plus", 17) + ' New bug report</h2></div>' +
      '<div class="body" id="mbody">' +
      '<div class="field"><label>Title *</label><input id="f-title" placeholder="e.g. Checkout returns 500 for all users" /></div>' +
      '<div class="field"><label>Description</label><textarea id="f-body" rows="4" placeholder="What happened, who is affected, since when…"></textarea></div>' +
      '<div class="field"><label>Source</label><select id="f-source"><option value="manual">manual</option><option value="github">github</option><option value="jira">jira</option><option value="slack">slack</option><option value="email">email</option></select></div>' +
      '<div class="field"><label>GitHub issue # <span style="color:var(--muted);font-weight:400">(optional — enables auto-assign back to the repo)</span></label><input id="f-extid" class="mono" placeholder="e.g. 12" /></div>' +
      '</div><div class="foot"><button class="btn ghost" id="m-cancel">Cancel</button><button class="btn primary" id="m-go">Triage it →</button></div></div>';
    document.body.appendChild(scrim);
    var close = function () { scrim.remove(); };
    scrim.addEventListener("click", function (e) { if (e.target === scrim) close(); });
    $("#m-cancel", scrim).onclick = close;
    $("#f-title", scrim).focus();
    $("#m-go", scrim).onclick = function () {
      var title = $("#f-title", scrim).value.trim();
      if (!title) { $("#f-title", scrim).focus(); toast("Title is required", "err"); return; }
      runTriage(scrim, {
        title: title,
        body: $("#f-body", scrim).value.trim(),
        source: $("#f-source", scrim).value,
        url: "", reporter: S.user && S.user.email ? S.user.email : "", external_id: $("#f-extid", scrim).value.trim()
      });
    };
  }

  var STEP_LABELS = { intake: "Submitting report", triage: "Classifying & scoring severity", suggest: "Drafting a fix", persist: "Saving to the board", end: "Done" };
  var STEP_ORDER = ["intake", "triage", "suggest", "persist", "end"];

  function stepperHtml(active) {
    return '<div class="steps">' + STEP_ORDER.map(function (id, i) {
      var ai = STEP_ORDER.indexOf(active);
      var cls = i < ai ? "done" : (i === ai ? "active" : "");
      var mark = i < ai ? ic("check", 12) : (i + 1);
      return '<div class="step ' + cls + '"><div class="ic">' + mark + '</div>' + STEP_LABELS[id] + '</div>';
    }).join("") + '</div>';
  }

  async function runTriage(scrim, inputs) {
    var body = $("#mbody", scrim), foot = scrim.querySelector(".foot");
    foot.style.display = "none";
    body.innerHTML = '<div style="font-size:13px;color:var(--text-2);margin-bottom:14px">Cortex is triaging your report…</div>' + stepperHtml("intake");
    try {
      var run = await client.workflows.runs.create("triage-issue");
      var nodeId = (run.active_wait && run.active_wait.node_id) ? run.active_wait.node_id : "intake";
      body.innerHTML = '<div style="font-size:13px;color:var(--text-2);margin-bottom:14px">Cortex is triaging your report…</div>' + stepperHtml("triage");
      run = await client.workflows.runs.submitForm(run.id, { node_id: nodeId, inputs: inputs });
      var terminal = { COMPLETED: 1, FAILED: 1, CANCELLED: 1, ERROR: 1 };
      var tries = 0;
      while (!terminal[(run.status || "").toUpperCase()] && tries < 90) {
        await new Promise(function (r) { setTimeout(r, 2000); });
        run = await client.workflows.runs.get(run.id);
        var cur = run.current_node_id || "triage";
        if (STEP_LABELS[cur]) body.innerHTML = '<div style="font-size:13px;color:var(--text-2);margin-bottom:14px">Cortex is triaging your report…</div>' + stepperHtml(cur);
        tries++;
      }
      var status = (run.status || "").toUpperCase();
      if (status === "COMPLETED") {
        body.innerHTML = '<div style="font-size:13px;color:var(--text-2);margin-bottom:14px;display:flex;align-items:center;gap:7px">Triaged ' + ic("check", 14) + '</div>' + stepperHtml("end");
        await loadAll();
        var newBug = S.bugs.find(function (b) { return b.title === inputs.title; });
        if (newBug) S.newest = newBug.id;
        setTimeout(function () { scrim.remove(); S.tab = "board"; render(); toast("Triaged: " + (newBug ? newBug.severity + " · " + newBug.bug_type : "done"), "ok"); }, 650);
      } else {
        scrim.remove();
        toast("Triage run " + status + (run.failed_node_id ? " at " + run.failed_node_id : "") + ". The agents may be busy — try again.", "err");
      }
    } catch (e) {
      scrim.remove();
      toast("Could not triage: " + (e.message || e), "err");
    }
  }

  // ---------- Release notes (Releases tab) ----------
  async function compileNotes(version, btn) {
    btn.disabled = true; var old = btn.textContent; btn.textContent = "Compiling…";
    try {
      var run = await client.workflows.runs.create("compile-release-notes");
      var nodeId = (run.active_wait && run.active_wait.node_id) ? run.active_wait.node_id : "intake";
      run = await client.workflows.runs.submitForm(run.id, { node_id: nodeId, inputs: { version: version } });
      var terminal = { COMPLETED: 1, FAILED: 1, CANCELLED: 1, ERROR: 1 }, tries = 0;
      while (!terminal[(run.status || "").toUpperCase()] && tries < 90) {
        await new Promise(function (r) { setTimeout(r, 2000); });
        run = await client.workflows.runs.get(run.id); tries++;
      }
      await loadAll(); render();
      var st = (run.status || "").toUpperCase();
      toast(st === "COMPLETED" ? "Release notes compiled for " + version : "Compile " + st + " — partial notes may exist", st === "COMPLETED" ? "ok" : "err");
    } catch (e) { toast("Compile failed: " + (e.message || e), "err"); render(); }
  }

  // ---------- Incident: status badge + ack ----------
  function incidentHtml(b) {
    var inc = S.incidentByBug[b.id];
    if (!inc) return '';
    if (inc.status === "resolved") {
      return '<div class="meta" style="margin-top:10px"><span class="tag" style="color:var(--green);background:var(--green-soft);display:inline-flex;align-items:center;gap:5px">' + ic("check", 11) + ' incident resolved</span></div>';
    }
    var alerted = inc.alert_channel_msg ? ' · alert sent' : ' · no alert channel configured';
    var resolveBtn = '<button class="btn ghost resolve-btn" data-inc="' + esc(inc.id) + '" style="padding:4px 11px;font-size:11.5px;margin-left:6px">Resolve</button>';
    if (inc.status === "acked") {
      return '<div class="meta" style="margin-top:10px"><span class="tag" style="color:var(--accent);background:var(--accent-soft)">acked' +
        (inc.assignee_login ? ' by @' + esc(inc.assignee_login) : '') + '</span>' + resolveBtn + '</div>';
    }
    return '<div class="meta" style="margin-top:10px">' +
      '<span class="tag" style="color:var(--p1);background:var(--p1-soft);display:inline-flex;align-items:center;gap:5px">' + ic("alertTriangle", 11) + ' incident open' + esc(alerted) + '</span>' +
      '<button class="btn ghost ack-btn" data-inc="' + esc(inc.id) + '" style="padding:4px 11px;font-size:11.5px;margin-left:6px">Ack</button>' +
      resolveBtn +
      '</div>';
  }

  async function ackIncident(incId, btn) {
    btn.disabled = true;
    try {
      var res = await client.functions.run("ack_incident", { input: { incident_id: incId, acked_by: (S.user && S.user.email) || "" } });
      var out = (res && (res.output_data || res.output)) || {};
      if (out && out.ok) { toast("Incident acked", "ok"); await loadAll(); render(); }
      else { toast("Ack failed: " + ((out && out.detail) || "unknown"), "err"); btn.disabled = false; }
    } catch (e) { toast("Ack failed: " + (e.message || e), "err"); btn.disabled = false; }
  }

  async function resolveIncident(incId, btn) {
    btn.disabled = true;
    try {
      var res = await client.functions.run("resolve_incident", { input: { incident_id: incId } });
      var out = (res && (res.output_data || res.output)) || {};
      if (out && out.ok) { toast("Incident resolved", "ok"); await loadAll(); render(); }
      else { toast("Resolve failed: " + ((out && out.detail) || "unknown"), "err"); btn.disabled = false; }
    } catch (e) { toast("Resolve failed: " + (e.message || e), "err"); btn.disabled = false; }
  }

  // ---------- Auto-resolve: fix-PR status ----------
  function fixPrHtml(b) {
    if (b.fix_pr_status === "opened" && b.fix_pr_url) {
      return '<div class="meta" style="margin-top:10px"><span class="tag" style="color:var(--green);background:var(--green-soft);display:inline-flex;align-items:center;gap:5px">' + ic("gitPr", 11) + ' fix PR opened</span> ' +
        '<a href="' + esc(b.fix_pr_url) + '" target="_blank" rel="noopener" style="font-size:11.5px;color:var(--accent);text-decoration:none;margin-left:4px;font-weight:600">view PR ↗</a></div>';
    }
    if (b.fix_pr_status === "failed") {
      return '<div class="meta" style="margin-top:10px"><span class="tag" style="color:var(--p1);background:var(--p1-soft)">auto-fix PR failed</span></div>';
    }
    return '';
  }

  // ---------- Ownership: suggest (auto, in triage) + approve→assign ----------
  function ownerHtml(b) {
    if (b.assign_status === "assigned" && b.assignee_login) {
      return '<div class="panel soft" style="display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--green);font-weight:600">' + ic("check", 13) + ' Assigned to @' + esc(b.assignee_login) + '</div>';
    }
    if (b.assign_status === "suggested" && b.assignee_login) {
      var commit = b.breaking_commit_url
        ? ' · <a href="' + esc(b.breaking_commit_url) + '" target="_blank" rel="noopener" style="color:var(--accent);text-decoration:none;font-weight:600">breaking commit ↗</a>' : '';
      return '<div class="panel soft">' +
        '<div style="font-size:12px;color:var(--muted)">suggested owner <span style="color:var(--text-2);font-weight:400">(editable — override if it\'s not a collaborator on the repo)</span></div>' +
        '<div style="display:flex;gap:7px;margin-top:6px;align-items:center">' +
        '<span class="mono" style="color:var(--muted)">@</span>' +
        '<input class="assignee-input mono" data-bug="' + esc(b.id) + '" value="' + esc(b.assignee_login) + '" style="flex:1;background:var(--surface);border:1px solid var(--border-strong);border-radius:9px;padding:6px 10px;font-size:13px;color:var(--text);outline:none" />' +
        '</div>' +
        '<div style="font-size:11.5px;color:var(--text-2);margin-top:6px">' + esc(b.assignee_reason || "") + commit + '</div>' +
        (b.assignee_candidates ? '<div style="font-size:11px;color:var(--muted);margin-top:5px">also has context: ' + esc(b.assignee_candidates) + '</div>' : '') +
        '<button class="btn primary assign-btn" data-bug="' + esc(b.id) + '" style="margin-top:10px;padding:6px 13px;font-size:12px">Approve &amp; assign →</button>' +
        '</div>';
    }
    return '';
  }

  async function approveAssign(bugId, btn) {
    if (!(S.cfg && S.cfg.repo)) { toast("Connect a repo first (settings button)", "err"); return; }
    var input = document.querySelector('.assignee-input[data-bug="' + bugId + '"]');
    var override = input ? input.value.trim().replace(/^@/, "") : "";
    btn.disabled = true; var old = btn.textContent; btn.textContent = "Assigning…";
    try {
      var res = await client.functions.run("assign_owner", { input: { bug_id: bugId, assignee: override } });
      var out = (res && (res.output_data || res.output)) || {};
      if (out && out.ok) { toast(out.detail || "Assigned", "ok"); await loadAll(); render(); }
      else { toast("Assign: " + ((out && out.detail) || (res && res.status) || "failed"), "err"); btn.disabled = false; btn.textContent = old; }
    } catch (e) { toast("Assign failed: " + (e.message || e), "err"); btn.disabled = false; btn.textContent = old; }
  }

  // ---------- Backlog decision: assign / defer / backlog / close ----------
  function decisionHtml(b) {
    var status = b.decision_status || "pending";
    if (status !== "pending") {
      var label = { assigned: "assigned", deferred: "deferred", backlogged: "backlogged", closed: "closed" }[status] || status;
      var when = b.deferred_until ? (' until ' + esc(String(b.deferred_until).slice(0, 10))) : '';
      return '<div class="panel soft" style="font-size:12px;color:var(--text-2)">' +
        '<span style="font-weight:600;color:var(--text)">decision: ' + esc(label) + when + '</span>' +
        (b.decision_reason ? '<div style="margin-top:4px;color:var(--text-2)">' + esc(b.decision_reason) + '</div>' : '') +
        (b.decision_by ? '<div style="margin-top:4px;font-size:11px;color:var(--muted)">by ' + esc(b.decision_by) + (b.decided_at ? ' · ' + esc(String(b.decided_at).slice(0, 10)) : '') + '</div>' : '') +
        '</div>';
    }
    var ctx = (b.is_production_code === false ? 'non-production' : 'production') +
      ' · ' + (b.affected_service_count || 1) + ' service' + ((b.affected_service_count || 1) === 1 ? '' : 's') +
      ' · ' + esc(b.fix_complexity || 'moderate') + ' fix';
    return '<div class="panel soft">' +
      '<div style="font-size:11.5px;color:var(--muted)">investigation context: ' + ctx + '</div>' +
      '<input class="decision-reason mono" data-bug="' + esc(b.id) + '" placeholder="why (optional)" style="width:100%;margin-top:8px;background:var(--surface);border:1px solid var(--border-strong);border-radius:9px;padding:6px 10px;font-size:12.5px;color:var(--text);outline:none" />' +
      '<div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">' +
      '<button class="btn primary decide-btn" data-bug="' + esc(b.id) + '" data-decision="assign" style="padding:5px 11px;font-size:11.5px">Assign</button>' +
      '<button class="btn ghost decide-btn" data-bug="' + esc(b.id) + '" data-decision="defer" style="padding:5px 11px;font-size:11.5px">Defer 2wk</button>' +
      '<button class="btn ghost decide-btn" data-bug="' + esc(b.id) + '" data-decision="backlog" style="padding:5px 11px;font-size:11.5px">Backlog</button>' +
      '<button class="btn ghost decide-btn" data-bug="' + esc(b.id) + '" data-decision="close" style="padding:5px 11px;font-size:11.5px">Close, not relevant</button>' +
      '</div></div>';
  }

  async function decideBug(bugId, decision, btn) {
    var input = document.querySelector('.decision-reason[data-bug="' + bugId + '"]');
    var reason = input ? input.value.trim() : "";
    btn.disabled = true; var old = btn.textContent; btn.textContent = "Saving…";
    try {
      var res = await client.functions.run("decide_bug", { input: {
        bug_id: bugId, decision: decision, reason: reason,
        decided_by: (S.user && S.user.email) || "", defer_days: 14
      } });
      var out = (res && (res.output_data || res.output)) || {};
      if (out && out.ok) { toast(out.detail || "Decision recorded", "ok"); await loadAll(); render(); }
      else { toast("Decision failed: " + ((out && out.detail) || "unknown"), "err"); btn.disabled = false; btn.textContent = old; }
    } catch (e) { toast("Decision failed: " + (e.message || e), "err"); btn.disabled = false; btn.textContent = old; }
  }

  // ---------- Settings: connect a GitHub repo (+ optional PAT) ----------
  function openSettings() {
    var scrim = h('<div class="scrim"></div>');
    var repo = S.cfg && S.cfg.repo ? S.cfg.repo : "";
    var webhook = S.alertCfg && S.alertCfg.slack_webhook_url ? S.alertCfg.slack_webhook_url : "";
    var escMin = S.alertCfg && S.alertCfg.escalation_minutes ? S.alertCfg.escalation_minutes : 15;
    var src = S.sourceCfg || {};
    scrim.innerHTML =
      '<div class="modal"><div class="head"><h2 style="display:flex;align-items:center;gap:9px">' + ic("sliders", 16) + ' Settings</h2></div>' +
      '<div class="body">' +
      '<div style="font-size:12px;font-weight:700;color:var(--text-2);text-transform:uppercase;letter-spacing:.4px">GitHub</div>' +
      '<div class="field"><label>Repository (owner/name)</label><input id="s-repo" class="mono" placeholder="octocat/Hello-World" value="' + esc(repo) + '" /></div>' +
      '<div class="field"><label>Personal access token <span style="color:var(--muted);font-weight:400">(only needed to auto-assign; stored privately)</span></label><input id="s-pat" type="password" placeholder="ghp_… (fine-scoped, repo access)" /></div>' +
      '<div style="font-size:11.5px;color:var(--muted);line-height:1.55">Reading a <strong>public</strong> repo needs no token — Cortex can already find the likely owner. A token is used only when you click "Approve &amp; assign". Use a fine-scoped token and revoke it after the demo.</div>' +
      '<div style="font-size:12px;font-weight:700;color:var(--text-2);text-transform:uppercase;letter-spacing:.4px;margin-top:6px">Source connectors</div>' +
      '<div class="field"><label>Jira base URL</label><input id="s-jira-url" class="mono" placeholder="https://your-team.atlassian.net" value="' + esc(src.jira_base_url || "") + '" /></div>' +
      '<div class="field"><label>Jira project key / JQL</label><div style="display:flex;gap:8px"><input id="s-jira-project" class="mono" placeholder="ENG" value="' + esc(src.jira_project_key || "") + '" /><input id="s-jira-jql" class="mono" placeholder="project = ENG AND status changed" value="' + esc(src.jira_jql || "") + '" /></div></div>' +
      '<div class="field"><label>Jira email / API token</label><div style="display:flex;gap:8px"><input id="s-jira-email" class="mono" placeholder="you@company.com" value="' + esc(src.jira_email || "") + '" /><input id="s-jira-token" type="password" placeholder="Jira API token" /></div></div>' +
      '<div class="field"><label>Slack channel / bot token</label><div style="display:flex;gap:8px"><input id="s-slack-channel" class="mono" placeholder="C0123456789" value="' + esc(src.slack_channel_id || "") + '" /><input id="s-slack-token" type="password" placeholder="xoxb-..." /></div></div>' +
      '<div class="field"><label>Email intake address</label><input id="s-email-inbox" class="mono" placeholder="bugs@company.com" value="' + esc(src.email_inbox_address || "") + '" /></div>' +
      '<div style="font-size:11.5px;color:var(--muted);line-height:1.55">External systems can post normalized payloads to ingest_external_report; Cortex dedupes them and queues them for triage.</div>' +
      '<div style="font-size:12px;font-weight:700;color:var(--text-2);text-transform:uppercase;letter-spacing:.4px;margin-top:6px">Alerts</div>' +
      '<div class="field"><label>Slack incoming webhook URL <span style="color:var(--muted);font-weight:400">(P1/P2 incidents post here)</span></label><input id="s-webhook" class="mono" placeholder="https://hooks.slack.com/services/…" value="' + esc(webhook) + '" /></div>' +
      '<div class="field"><label>Escalation window (minutes)</label><input id="s-escmin" type="number" min="1" value="' + esc(escMin) + '" /></div>' +
      '</div><div class="foot"><button class="btn ghost" id="s-cancel">Cancel</button><button class="btn primary" id="s-save">Save</button></div></div>';
    document.body.appendChild(scrim);
    scrim.addEventListener("click", function (e) { if (e.target === scrim) scrim.remove(); });
    $("#s-cancel", scrim).onclick = function () { scrim.remove(); };
    $("#s-save", scrim).onclick = async function () {
      var repoVal = $("#s-repo", scrim).value.trim(), patVal = $("#s-pat", scrim).value.trim();
      var webhookVal = $("#s-webhook", scrim).value.trim(), escMinVal = parseInt($("#s-escmin", scrim).value, 10) || 15;
      try {
        if (repoVal || patVal || (S.cfg && S.cfg.id)) {
          var payload = { repo: repoVal || "owner/name", label: "default" };
          if (patVal) payload.pat = patVal;
          if (S.cfg && S.cfg.id) await client.records.update("github_config", S.cfg.id, payload);
          else await client.records.create("github_config", payload);
        }

        var sourcePayload = {
          label: "default",
          jira_base_url: $("#s-jira-url", scrim).value.trim(),
          jira_email: $("#s-jira-email", scrim).value.trim(),
          jira_project_key: $("#s-jira-project", scrim).value.trim(),
          jira_jql: $("#s-jira-jql", scrim).value.trim(),
          slack_channel_id: $("#s-slack-channel", scrim).value.trim(),
          email_inbox_address: $("#s-email-inbox", scrim).value.trim(),
          auto_triage_enabled: true
        };
        var jiraToken = $("#s-jira-token", scrim).value.trim(), slackToken = $("#s-slack-token", scrim).value.trim();
        if (jiraToken) sourcePayload.jira_api_token = jiraToken;
        if (slackToken) sourcePayload.slack_bot_token = slackToken;
        if (S.sourceCfg && S.sourceCfg.id) await client.records.update("source_config", S.sourceCfg.id, sourcePayload);
        else await client.records.create("source_config", sourcePayload);

        var alertPayload = { slack_webhook_url: webhookVal, escalation_minutes: escMinVal, label: "default" };
        if (S.alertCfg && S.alertCfg.id) await client.records.update("alert_config", S.alertCfg.id, alertPayload);
        else await client.records.create("alert_config", alertPayload);

        scrim.remove(); await loadAll(); render(); toast("Settings saved", "ok");
      } catch (e) { toast("Save failed: " + (e.message || e), "err"); }
    };
  }
  </script>
</body>
</html>
